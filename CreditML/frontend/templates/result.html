{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result</title>

  <!-- External Resources -->
  <script src="https://kit.fontawesome.com/47101d2035.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" 
    integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

  <style>
    body {
      background-image: url("{% static 'images/ch2.png' %}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: whitesmoke;
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      position: relative;
    }

    .navbar {
      background-color: rgba(44, 44, 44, 0.85);
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }

    .navbar-brand, .nav-link {
      color: white !important;
      font-size: 1.1rem;
      font-weight: bold;
      transition: color 0.3s ease;
      text-transform: uppercase;
    }

    .nav-item:hover .nav-link {
      color: #ffc107;
    }

    .content-container {
      position: absolute;
      left: 50%;
      top: 55%;
      transform: translate(-50%, -50%);
      text-align: center;
      padding: 40px 30px;
      border-radius: 10px;
      background-color: rgba(0, 0, 0, 0.75);
      border: 2px solid #ffc107;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      max-width: 700px;
      width: 90%;
      animation: fadeIn 1s ease-in-out;
    }

    h2 {
      font-size: 2rem;
      color: #f7f7f7;
      margin-bottom: 25px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .value {
      color: #ffc107;
      font-size: 2.2rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand" href="{% url 'home' %}">Fraud Detection</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" 
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">Predict</a></li>
        {% if user.is_authenticated %}
        <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
        {% else %}
        <li class="nav-item"><a class="nav-link" href="{% url 'signup' %}">Signup</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
        {% endif %}
      </ul>
    </div>
  </nav>

  <!-- Content Container -->
  <div class="content-container">
    <h2>Credit Card Fraud Detection</h2>
    <div class="result-description">
      <h2>PREDICTION: <span class="value">{{ result }}</span></h2>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.11.0/umd/popper.min.js" crossorigin="anonymous"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" crossorigin="anonymous"></script>
</body>

</html>
{% endblock content %}
